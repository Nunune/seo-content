<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tăng trưởng AI Search vs Google Search 2020–2025</title>
<style>
  body {
    margin: 0;
    padding: 20px;
    background: #ffffff;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .chart-wrapper {
    background: #ffffff;
    padding: 24px 20px 16px;
    border-radius: 8px;
  }
  h2 {
    text-align: center;
    color: #111827;
    font-size: 15px;
    font-weight: 700;
    margin: 0 0 4px 0;
  }
  .subtitle {
    text-align: center;
    color: #6B7280;
    font-size: 11px;
    margin: 0 0 16px 0;
  }
  .note {
    text-align: center;
    color: #9CA3AF;
    font-size: 10px;
    margin-top: 10px;
    font-style: italic;
  }
</style>
</head>
<body>
<div class="chart-wrapper">
  <h2>Tỷ Lệ Ứng Dụng AI Trong SEO & Content Marketing (2020–2025)</h2>
  <p class="subtitle">Nguồn: BrightEdge 2024 (58%), HubSpot 2024 (73%) — dữ liệu trung gian ước tính xu hướng</p>
  <canvas id="myChart" width="860" height="414"></canvas>
  <p class="note">* 2025: dự báo dựa trên tốc độ tăng trưởng 2022–2024</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
<script>
  const ctx = document.getElementById('myChart').getContext('2d');

  new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['2020', '2021', '2022', '2023', '2024', '2025*'],
      datasets: [
        {
          label: 'Doanh nghiệp dùng AI trong SEO (%)',
          data: [8, 13, 22, 38, 58, 72],
          borderColor: '#3B82F6',
          backgroundColor: 'rgba(59,130,246,0.10)',
          fill: true,
          tension: 0.4,
          borderWidth: 2.5,
          pointRadius: 5,
          pointHoverRadius: 7,
          pointBackgroundColor: '#3B82F6',
        },
        {
          label: 'Marketer dùng AI cho Content Marketing (%)',
          data: [5, 10, 20, 40, 73, 85],
          borderColor: '#10B981',
          backgroundColor: 'rgba(16,185,129,0.08)',
          fill: true,
          tension: 0.4,
          borderWidth: 2.5,
          pointRadius: 5,
          pointHoverRadius: 7,
          pointBackgroundColor: '#10B981',
        }
      ]
    },
    options: {
      responsive: false,
      animation: false,
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            font: { size: 12, family: 'Arial' },
            color: '#374151',
            padding: 16,
            boxWidth: 14,
          }
        },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${ctx.raw}%`
          }
        },
        annotation: {
          annotations: {
            brightedge: {
              type: 'point',
              xValue: '2024',
              yValue: 58,
              backgroundColor: '#3B82F6',
              radius: 0,
              label: {
                content: 'BrightEdge 2024\n58%',
                display: true,
                position: 'start',
                font: { size: 10 },
                color: '#1D4ED8',
                xAdjust: -40,
                yAdjust: -22,
              }
            },
            hubspot: {
              type: 'point',
              xValue: '2024',
              yValue: 73,
              backgroundColor: '#10B981',
              radius: 0,
              label: {
                content: 'HubSpot 2024\n73%',
                display: true,
                position: 'start',
                font: { size: 10 },
                color: '#059669',
                xAdjust: 10,
                yAdjust: -22,
              }
            }
          }
        }
      },
      scales: {
        x: {
          grid: { color: '#F3F4F6' },
          ticks: { font: { size: 12, family: 'Arial' }, color: '#6B7280' }
        },
        y: {
          min: 0,
          max: 100,
          grid: { color: '#F3F4F6' },
          ticks: {
            font: { size: 12, family: 'Arial' },
            color: '#6B7280',
            callback: val => val + '%'
          },
          title: {
            display: true,
            text: '% người dùng / doanh nghiệp',
            font: { size: 11, family: 'Arial' },
            color: '#9CA3AF'
          }
        }
      }
    }
  });
</script>
</body>
</html>
